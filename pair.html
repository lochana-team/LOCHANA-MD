<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOCHANAA MD - PAIR CODE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --neon-blue: #00d9ff;
      --deep-blue: #0051ff;
      --bg-color: #030712;
      --card-bg: rgba(17, 25, 40, 0.75);
      --border-color: rgba(0, 217, 255, 0.3);
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: var(--bg-color);
      background-image: 
        radial-gradient(at 0% 0%, rgba(0, 81, 255, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(0, 217, 255, 0.15) 0px, transparent 50%);
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      overflow: hidden;
    }

    .wrapper {
      position: relative;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid var(--border-color);
      border-radius: 25px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), 
                  0 0 15px rgba(0, 217, 255, 0.1);
    }

    .bot-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(45deg, var(--deep-blue), var(--neon-blue));
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      color: #fff;
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
    }

    h2 {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(to right, #fff, var(--neon-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--neon-blue);
      margin-bottom: 8px;
      margin-left: 5px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 15px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      box-sizing: border-box;
      outline: none;
      transition: 0.3s;
      text-align: center;
      letter-spacing: 1px;
    }

    input:focus {
      border-color: var(--neon-blue);
      box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(45deg, var(--deep-blue), var(--neon-blue));
      border: none;
      border-radius: 12px;
      color: #000;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 217, 255, 0.4);
    }

    #loading-spinner {
      display: none;
      margin: 20px 0;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(0, 217, 255, 0.1);
      border-top: 3px solid var(--neon-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #pair-display {
      margin-top: 25px;
      min-height: 60px;
    }

    .code-box {
      background: rgba(0, 217, 255, 0.1);
      border: 2px dashed var(--neon-blue);
      border-radius: 12px;
      padding: 15px;
      cursor: pointer;
      transition: 0.3s;
      animation: fadeInUp 0.5s ease;
    }

    .code-box:hover {
      background: rgba(0, 217, 255, 0.15);
    }

    .code-text {
      font-family: 'Courier New', monospace;
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      display: block;
      letter-spacing: 5px;
      text-shadow: 0 0 10px var(--neon-blue);
    }

    .copy-hint {
      font-size: 10px;
      color: var(--neon-blue);
      margin-top: 5px;
      display: block;
    }

    .error {
      color: #ff4d4d;
      font-size: 13px;
      background: rgba(255, 77, 77, 0.1);
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 77, 77, 0.3);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="glass-card">
      <div class="bot-logo">
        <i class="fa-solid fa-bolt"></i>
      </div>
      <h2>LOCHANAA MD</h2>
      <p>Enter your phone number without the "+" sign.</p>

      <div class="input-group">
        <label>WhatsApp Number</label>
        <input type="number" id="number" placeholder="94704xxxxxx">
      </div>

      <button id="submit">Get Pair Code</button>

      <div id="loading-spinner">
        <div class="spinner"></div>
      </div>

      <div id="pair-display"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    const pairDisplay = document.getElementById("pair-display");
    const submitBtn = document.getElementById("submit");
    const numberInput = document.getElementById("number");
    const loader = document.getElementById("loading-spinner");

    async function copyCode() {
      const codeElement = document.getElementById("pair-code-val");
      const code = codeElement.innerText;
      await navigator.clipboard.writeText(code);
      
      const hint = document.querySelector(".copy-hint");
      const originalHint = hint.innerText;
      hint.innerText = "✔️ COPIED TO CLIPBOARD";
      hint.style.color = "#00ff88";
      
      setTimeout(() => {
        hint.innerText = originalHint;
        hint.style.color = "var(--neon-blue)";
      }, 2000);
    }

    submitBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      const rawNumber = numberInput.value.trim();

      if (!rawNumber) {
        pairDisplay.innerHTML = '<div class="error">❗ Please enter your number.</div>';
        return;
      }

      // Clean the number: remove +, spaces, and any non-digits
      const cleanNumber = rawNumber.replace(/[^0-9]/g, "");

      if (cleanNumber.length < 10) {
        pairDisplay.innerHTML = '<div class="error">❗ Invalid phone number format.</div>';
        return;
      }

      // UI reset
      pairDisplay.innerHTML = "";
      loader.style.display = "block";
      submitBtn.disabled = true;
      submitBtn.style.opacity = "0.5";

      try {
        // Sending the clean number to the backend
        const { data } = await axios.get(`/code?number=${cleanNumber}`);
        const code = data.code || "SERVICE ERROR";

        if (data.code) {
          pairDisplay.innerHTML = `
            <div class="code-box" onclick="copyCode()">
              <span class="code-text" id="pair-code-val">${code}</span>
              <span class="copy-hint">CLICK TO COPY CODE</span>
            </div>
          `;
        } else {
          pairDisplay.innerHTML = '<div class="error">❗ Could not generate code. Try again.</div>';
        }

      } catch (err) {
        console.error(err);
        pairDisplay.innerHTML = '<div class="error">❗ Server connection failed.</div>';
      } finally {
        loader.style.display = "none";
        submitBtn.disabled = false;
        submitBtn.style.opacity = "1";
      }
    });
  </script>
</body>
</html>
